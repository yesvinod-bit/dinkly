    <noscript>
      <div style="max-width:600px;margin:60px auto;padding:24px;font-family:sans-serif;line-height:1.6">
        <h1>Dinkly — Free Pickleball Round Robin Scorer</h1>
        <p>Dinkly is a free web app for running pickleball round robin mixers and tournaments. Create a tournament in seconds, share a join link or QR code, and let Dinkly automatically generate balanced pairings, track live scores, and display real-time standings.</p>
        <h2>Features</h2>
        <ul>
          <li>Pickleball round robin pairing generator — minimizes repeat partners and opponents</li>
          <li>Live score entry with instant leaderboard updates</li>
          <li>Doubles (2v2) and singles (1v1) formats</li>
          <li>Fixed partner teams or random partner rotation</li>
          <li>Playoff bracket with seeded matchups</li>
          <li>Player profiles with stats across tournaments</li>
          <li>Shareable join links and QR codes — no app download needed</li>
          <li>Installable as a PWA on iOS and Android</li>
        </ul>
        <p>To use Dinkly, please enable JavaScript in your browser.</p>
